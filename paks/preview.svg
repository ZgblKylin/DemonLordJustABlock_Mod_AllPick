<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#16213e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE066"/>
      <stop offset="50%" style="stop-color:#FFB800"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>
    <linearGradient id="whiteGold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#CCBB88"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.6"/>
    </filter>
    <filter id="glowGold">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="rgba(255,215,0,0.06)" stroke-width="2"/>
  <circle cx="256" cy="256" r="160" fill="none" stroke="rgba(255,215,0,0.08)" stroke-width="1"/>
  <circle cx="80" cy="100" r="30" fill="none" stroke="rgba(255,215,0,0.1)" stroke-width="1.5"/>
  <circle cx="440" cy="120" r="20" fill="none" stroke="rgba(255,215,0,0.08)" stroke-width="1"/>
  <circle cx="100" cy="420" r="18" fill="none" stroke="rgba(255,215,0,0.06)" stroke-width="1"/>
  <circle cx="430" cy="400" r="22" fill="none" stroke="rgba(255,215,0,0.1)" stroke-width="1.5"/>

  <!-- Cards icon (fanned) -->
  <g transform="translate(256, 135)">
    <rect x="-68" y="-40" width="50" height="68" rx="4" fill="rgba(255,215,0,0.12)" stroke="rgba(255,215,0,0.45)" stroke-width="2" transform="rotate(-18)"/>
    <rect x="-24" y="-44" width="50" height="68" rx="4" fill="rgba(255,215,0,0.22)" stroke="rgba(255,215,0,0.65)" stroke-width="2.5"/>
    <rect x="20" y="-40" width="50" height="68" rx="4" fill="rgba(255,215,0,0.12)" stroke="rgba(255,215,0,0.45)" stroke-width="2" transform="rotate(18)"/>
    <!-- Star on center card -->
    <polygon points="1,-22 4,-8 18,-8 8,2 12,16 1,8 -10,16 -6,2 -16,-8 -2,-8" fill="none" stroke="#FFD700" stroke-width="2.5" stroke-linejoin="round"/>
  </g>

  <!-- Divider line -->
  <line x1="120" y1="218" x2="392" y2="218" stroke="rgba(255,215,0,0.2)" stroke-width="1"/>

  <!-- Chinese title -->
  <text x="256" y="280" text-anchor="middle" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="48" font-weight="bold" fill="url(#gold)" filter="url(#glowGold)" letter-spacing="8">奖励全选</text>
  <text x="256" y="332" text-anchor="middle" font-family="Microsoft YaHei, SimHei, Arial, sans-serif" font-size="48" font-weight="bold" fill="url(#gold)" filter="url(#glowGold)" letter-spacing="8">免费购买</text>

  <!-- English subtitle -->
  <text x="256" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="url(#whiteGold)" filter="url(#shadow)" letter-spacing="3">
    ALL PICK &amp; FREE SHOP
  </text>

  <!-- Bottom decoration -->
  <line x1="180" y1="415" x2="332" y2="415" stroke="rgba(255,215,0,0.25)" stroke-width="1.5"/>
  <line x1="210" y1="425" x2="302" y2="425" stroke="rgba(255,215,0,0.15)" stroke-width="1"/>

  <!-- Mod label -->
  <text x="256" y="455" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.22)" letter-spacing="4">
    DEMON LORD MOD
  </text>

  <!-- Corner brackets -->
  <path d="M 24 24 L 24 72 M 24 24 L 72 24" fill="none" stroke="rgba(255,215,0,0.2)" stroke-width="2"/>
  <path d="M 488 24 L 488 72 M 488 24 L 440 24" fill="none" stroke="rgba(255,215,0,0.2)" stroke-width="2"/>
  <path d="M 24 488 L 24 440 M 24 488 L 72 488" fill="none" stroke="rgba(255,215,0,0.2)" stroke-width="2"/>
  <path d="M 488 488 L 488 440 M 488 488 L 440 488" fill="none" stroke="rgba(255,215,0,0.2)" stroke-width="2"/>
</svg>
